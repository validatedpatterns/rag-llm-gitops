---
- name: Create EDB Postgres Operator Pull Secret
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    edb_operator_namespace: openshift-operators
    edb_secret_name: postgresql-operator-pull-secret
  tasks:
    - name: Find values-secret file in home directory
      ansible.builtin.find:
        paths: "{{ lookup('env', 'HOME') }}"
        patterns: "values-secret-*.yaml"
        recurse: no
      register: values_secret_files

    - name: Set values-secret file path
      ansible.builtin.set_fact:
        values_secret_file: "{{ values_secret_files.files[0].path }}"
      when: values_secret_files.matched > 0

    - name: Load values-secret.yaml if it exists
      ansible.builtin.include_vars:
        file: "{{ values_secret_file }}"
        name: values_secret_data
      when: values_secret_files.matched > 0

    - name: Extract EDB token from values-secret
      ansible.builtin.set_fact:
        edb_token: "{{ values_secret_data.secrets | selectattr('name', 'equalto', 'edb') | map(attribute='fields') | flatten | selectattr('name', 'equalto', 'token') | map(attribute='value') | first | default('') }}"
      when: 
        - values_secret_files.matched > 0
        - values_secret_data.secrets is defined

    - name: Check if EDB token is provided
      ansible.builtin.debug:
        msg: "EDB token is {{ 'configured (' + (edb_token | length | string) + ' chars)' if edb_token and edb_token != 'null' else 'NOT configured' }}"

    - name: Skip secret creation if no token provided
      ansible.builtin.debug:
        msg: "Skipping EDB pull secret creation - no token configured in values-secret.yaml"
      when: not edb_token or edb_token == 'null' or edb_token == ''

    - name: End play if no token
      ansible.builtin.meta: end_play
      when: not edb_token or edb_token == 'null' or edb_token == ''

    - name: Check if EDB pull secret already exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ edb_secret_name }}"
        namespace: "{{ edb_operator_namespace }}"
      register: existing_secret

    - name: Create EDB pull secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ edb_secret_name }}"
            namespace: "{{ edb_operator_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ docker_config | to_json | b64encode }}"
      vars:
        docker_config:
          auths:
            docker.enterprisedb.com:
              username: "k8s"
              password: "{{ edb_token }}"
              auth: "{{ ('k8s:' + edb_token) | b64encode }}"
      when: existing_secret.resources | length == 0

    - name: Update existing EDB pull secret if token changed
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ edb_secret_name }}"
            namespace: "{{ edb_operator_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ docker_config | to_json | b64encode }}"
      vars:
        docker_config:
          auths:
            docker.enterprisedb.com:
              username: "k8s"
              password: "{{ edb_token }}"
              auth: "{{ ('k8s:' + edb_token) | b64encode }}"
      when: existing_secret.resources | length > 0

    - name: Verify secret was created
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ edb_secret_name }}"
        namespace: "{{ edb_operator_namespace }}"
      register: final_secret

    - name: Display success message
      ansible.builtin.debug:
        msg: "EDB pull secret '{{ edb_secret_name }}' successfully {{ 'created' if existing_secret.resources | length == 0 else 'updated' }} in namespace '{{ edb_operator_namespace }}'"
      when: final_secret.resources | length > 0
