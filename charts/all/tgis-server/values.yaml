global:
  tgisServer:
    enabled: true
  model:
    tgis: mistralai/Mistral-7B-Instruct-v0.3

replicaCount: 1
image:
  repository: ghcr.io/huggingface/text-generation-inference
  pullPolicy: IfNotPresent
  tag: 3.1.0 # this is the latest version usable until the upstream image is fixed to work without the root user

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault


service:
  type: ClusterIP
  port: 3000

env:
  maxInputLength: 4096
  maxTotalTokens: 8192
  host: 0.0.0.0

resources:
  limits:
    nvidia.com/gpu: '1'

livenessProbe:
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  timeoutSeconds: 8
  periodSeconds: 100
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  timeoutSeconds: 5
  periodSeconds: 30
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  timeoutSeconds: 1
  periodSeconds: 30
  successThreshold: 1
  failureThreshold: 24

nodeSelector: {}

tolerations:
  - key: odh-notebook
    value: 'true'
    effect: NoSchedule

persistence:
  accessMode: ReadWriteOnce
  size: 30Gi
  annotations: {}
  volumeMode: Filesystem

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: nvidia.com/gpu.present
              operator: In
              values: ["true"]

route:
  enabled: true
